name: Build Multi Docker Images

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  build-docker-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - path: ./hermes/Dockerfile
            context: hermes 
#          - path: ./picoclaw/Dockerfile
#            context: picoclaw

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.dockerfile.context }}
          file: ${{ matrix.dockerfile.path }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}_${{ matrix.dockerfile.context }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}_${{ matrix.dockerfile.context }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
